<!DOCTYPE html>

    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />

    <style>
        :root {
            --primary-navy: #1a2a44;
            --primary-light-navy: #2c3e50;
            --accent-yellow: #ffdd00;
            --grape-color: #8e44ad;
            --bg-color: #f8fafd;
            --white: #ffffff;
            --text-main: #2c3e50;
            --text-muted: #7f8c8d;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            margin: 0;
            background: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            overflow-x: hidden;
        }

        .container {
            max-width: 500px;
            margin: auto;
            background: var(--white);
            min-height: 100vh;
            padding-bottom: 60px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            position: relative;
        }

        /* 비디오 영역 고정 */
        .video-box {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .video-box iframe { width: 100%; height: 100%; border: none; }

        .content { padding: 24px; box-sizing: border-box; }

        .brand-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .brand-logo {
            font-weight: 800;
            font-size: 1.2rem;
            color: var(--primary-navy);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .brand-logo span { color: var(--grape-color); }

        /* 버튼 디자인 통일 */
        .action-row { 
            display: flex; 
            gap: 12px; 
            margin-bottom: 12px; 
            align-items: stretch; 
        }
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 14px;
            font-weight: 800;
            cursor: pointer;
            transition: var(--transition);
            border: none;
            text-decoration: none;
            padding: 12px;
            font-size: 0.95rem;
            text-align: center;
            line-height: 1.2;
        }
        .btn-navy { background: var(--primary-navy); color: var(--white); flex: 1.8; }
        .btn-yellow { background: var(--accent-yellow); color: var(--primary-navy); flex: 1.4; padding: 12px 5px; }

        .btn-emoji-large {
            font-size: 2.4rem;
            margin-right: 4px; 
            line-height: 1;
            flex-shrink: 0;
        }

        .support-text {
            font-size: 1rem;
            font-weight: 700;
            color: var(--primary-navy);
            text-align: left;
            margin-bottom: 24px;
            padding: 5px 0;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 12px;
            line-height: 1.4;
        }
        .coffee-icon { font-size: 2.2rem; flex-shrink: 0; } 

        /* 스탬프 판 */
        .grape-section {
            display: none;
            background: #fdfaff;
            padding: 20px 14px 14px 14px;
            border-radius: 20px;
            margin-bottom: 24px;
            border: 2px solid #ecdff5;
            position: relative;
            animation: fadeIn 0.4s ease-out;
            box-sizing: border-box;
            width: 100%;
        }
        .grape-icon-badge {
            position: absolute;
            top: -22px;
            left: 10px;
            font-size: 44px;
            z-index: 10;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .grape-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            font-weight: 700;
            color: var(--grape-color);
            padding-left: 55px;
        }
        .progress-bar-container {
            width: 100%;
            height: 8px;
            background: #eee;
            border-radius: 10px;
            margin-bottom: 12px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            background: var(--grape-color);
            width: 0%;
            transition: width 0.5s ease;
        }

        .grape-grid {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 4px;
            width: 100%;
            box-sizing: border-box;
            padding: 2px;
        }
        .grape {
            width: 100%;
            aspect-ratio: 1/1;
            background: var(--white);
            border-radius: 50%;
            border: 1.5px solid #eee;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.95rem;
            color: #ccc;
            font-weight: 800;
            transition: var(--transition);
            box-sizing: border-box;
        }
        .grape.filled {
            background: var(--grape-color);
            border-color: var(--grape-color);
            color: white;
            transform: scale(1.05);
        }

        .close-board-btn {
            display: block;
            margin: 12px auto 0;
            background: none;
            border: none;
            color: var(--text-muted);
            text-decoration: underline;
            font-size: 0.8rem;
            cursor: pointer;
        }

        select, input[type="text"] {
            width: 100%;
            padding: 14px 16px;
            border-radius: 14px;
            border: 2px solid #edf2f7;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
            transition: var(--transition);
            background: #fcfdfe;
            margin-bottom: 12px;
        }

        .submit-btn {
            width: 100%;
            padding: 18px;
            background: var(--primary-navy);
            color: var(--white);
            border: none;
            border-radius: 16px;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 4px 0px #0d1624;
            margin-bottom: 15px;
        }
        .submit-btn:active { transform: translateY(3px); box-shadow: 0 1px 0px #0d1624; }

        .feedback-section {
            background: var(--primary-navy);
            padding: 30px 20px;
            border-radius: 32px 32px 0 0;
            margin-top: 40px;
            color: white;
        }

        .padlet-container {
            width: 100%;
            height: 360px;
            border-radius: 20px;
            overflow: hidden;
            background: white;
            border: 4px solid rgba(255,255,255,0.1);
            margin-bottom: 20px;
        }

        .verify-btn {
            width: 100%;
            padding: 18px;
            background: var(--accent-yellow);
            color: var(--primary-navy);
            border: none;
            border-radius: 16px;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 4px 0px #e6c600;
        }

        /* 팝업 모달 스타일 */
        #stamp-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 20px;
            backdrop-filter: blur(8px);
        }
        .stamp-card {
            background: white;
            padding: 40px 24px;
            border-radius: 40px;
            text-align: center;
            width: 100%;
            max-width: 440px; 
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            box-sizing: border-box;
        }
        @keyframes popIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .illustration-container {
            width: 100%;
            min-height: 240px; 
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            padding: 15px;
            box-sizing: border-box;
            overflow: hidden;
        }

        .big-encourage-text {
            font-size: 2.2rem;
            font-weight: 900;
            line-height: 1.4;
            color: var(--primary-navy);
            text-wrap: balance;
            word-break: break-word;
            background: linear-gradient(135deg, var(--primary-navy) 0%, var(--grape-color) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: textAppear 0.8s ease-out forwards;
            max-width: 100%;
        }

        .lang-ja { font-family: 'M PLUS Rounded 1c', sans-serif; font-weight: 800; font-size: 2rem; }
        .lang-zh { font-family: 'ZCOOL KuaiLe', cursive; font-size: 2.4rem; letter-spacing: 1px; }

        @keyframes textAppear { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .fancy-trophy-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .fancy-trophy-svg {
            width: 280px;
            height: 280px;
            filter: drop-shadow(0 15px 35px rgba(255, 215, 0, 0.5));
            animation: trophyActive 2s infinite ease-in-out;
        }
        @keyframes trophyActive { 0%, 100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-15px) scale(1.05); } }

        .custom-alert {
            display: none;
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 14px 28px;
            border-radius: 50px;
            z-index: 3000;
            font-size: 0.95rem;
            animation: slideDown 0.3s forwards;
            max-width: 85%;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        @keyframes slideDown { from { top: -100px; } to { top: 20px; } }
    </style>
</head>

    function renderGrapes() {
        grapeGrid.innerHTML = '';
        for (let i = 0; i < 100; i++) {
            const grape = document.createElement('div');
            const isCompleted = completedDays.includes(i.toString());
            grape.className = 'grape' + (isCompleted ? ' filled' : '');
            grape.innerText = i + 1;
            grapeGrid.appendChild(grape);
        }
        document.getElementById('progress-text').innerText = `${completedDays.length} / 100`;
        const progressBar = document.getElementById('progress-bar');
        if (progressBar) progressBar.style.width = `${completedDays.length}%`;
    }
    renderGrapes();

    const select = document.getElementById('grammarSelect');
    grammarNames.forEach((name, index) => {
        const option = document.createElement('option');
        option.value = index;
        option.text = `Day ${index + 1}: ${name}`;
        select.appendChild(option);
    });

    function toggleGrapeBoard() {
        const board = document.getElementById('grape-section');
        const isHidden = getComputedStyle(board).display === 'none';
        board.style.display = isHidden ? 'block' : 'none';
        if(isHidden) board.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    function updateVideo() {
        const val = select.value;
        const player = document.getElementById('mainPlayer');
        if (val === "review") {
            player.src = "https://www.youtube.com/embed?listType=playlist&list=PLdNKi3Jkq1kmbPOQuexdPMYDxvrkfnWha&index=1";
        } else if (val === "-1") {
            player.src = "https://www.youtube.com/embed/videoseries?list=PLdNKi3Jkq1kmbPOQuexdPMYDxvrkfnWha";
        } else {
            const youtubeIndex = parseInt(val) + 2;
            player.src = `https://www.youtube.com/embed?listType=playlist&list=PLdNKi3Jkq1kmbPOQuexdPMYDxvrkfnWha&index=${youtubeIndex}`;
        }
    }

    function showAlert(msg) {
        const alertBox = document.getElementById('custom-alert');
        alertBox.innerText = msg;
        alertBox.style.display = 'block';
        setTimeout(() => { alertBox.style.display = 'none'; }, 4000);
    }

    function copyAndGuide() {
        const val = select.value;
        const name = document.getElementById('studentName').value.trim();
        const text = document.getElementById('sentence').value.trim();
        if(val === "-1" || val === "review") { showAlert(currentLang.alert); return; }
        if(!name || !text) { showAlert("Name & Sentence please!"); return; }
        const dayNum = parseInt(val) + 1;
        const finalFormat = `[Day ${dayNum}. ${grammarNames[val]}][${name}] ${text}`;
        const textArea = document.createElement("textarea");
        textArea.value = finalFormat;
        textArea.style.position = "fixed";
        textArea.style.left = "-9999px";
        document.body.appendChild(textArea);
        textArea.focus();
        textArea.select();
        try { 
            document.execCommand('copy'); 
            showAlert(currentLang.copySuccess);
            setTimeout(() => { document.getElementById('feedback-area').scrollIntoView({ behavior: 'smooth' }); }, 500);
        } catch (err) { console.error('Copy failed', err); } 
        finally { document.body.removeChild(textArea); }
    }

    function triggerConfetti() {
        const duration = 5 * 1000;
        const animationEnd = Date.now() + duration;
        const defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 3000 };
        function randomInRange(min, max) { return Math.random() * (max - min) + min; }
        const interval = setInterval(function() {
          const timeLeft = animationEnd - Date.now();
          if (timeLeft <= 0) return clearInterval(interval);
          const particleCount = 50 * (timeLeft / duration);
          confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
          confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
        }, 250);
    }

    function showMilestoneModal(count, customLang = null) {
        const langObj = customLang || currentLang;
        const selectedLangKey = customLang ? document.getElementById('adminLangSelect').value : (translations[rawLang] ? rawLang : 'en');
        const modalTitle = document.getElementById('stamp-text');
        const illustContainer = document.getElementById('growth-illustration');
        
        modalTitle.innerText = langObj.stamp;
        illustContainer.innerHTML = ''; 

        if (count === 100) {
            modalTitle.innerText = langObj.completeTitle;
            illustContainer.innerHTML = getFancyPinTrophy();
            if (!customLang) triggerConfetti();
        } else {
            let encourageText = "";
            if (count >= 1 && count < 5) encourageText = langObj.milestone1;
            else if (count >= 5 && count < 15) encourageText = langObj.milestone5;
            else if (count >= 15 && count < 30) encourageText = langObj.milestone15;
            else if (count >= 30 && count < 50) encourageText = langObj.milestone30;
            else if (count >= 50 && count < 75) encourageText = langObj.milestone50;
            else if (count >= 75 && count < 90) encourageText = langObj.milestone75;
            else if (count >= 90 && count < 100) encourageText = langObj.milestone90;
            else encourageText = langObj.praise;

            const textDiv = document.createElement('div');
            textDiv.className = 'big-encourage-text';
            if (selectedLangKey === 'ja') textDiv.classList.add('lang-ja');
            if (selectedLangKey === 'zh') textDiv.classList.add('lang-zh');
            textDiv.innerText = encourageText;
            illustContainer.appendChild(textDiv);
        }
        document.getElementById('stamp-overlay').style.display = 'flex';
    }

    function completeAndStamp() {
        const val = select.value;
        if(val === "-1" || val === "review") { showAlert(currentLang.alert); return; }
        if (!completedDays.includes(val)) {
            completedDays.push(val);
            localStorage.setItem('completedDays', JSON.stringify(completedDays));
            renderGrapes();
        }
        showMilestoneModal(completedDays.length);
    }

    function adminPreview(count) {
        const selectedLangKey = document.getElementById('adminLangSelect').value;
        const targetLangObj = translations[selectedLangKey];
        showMilestoneModal(count, targetLangObj);
    }

    function closeStamp() { document.getElementById('stamp-overlay').style.display = 'none'; }
